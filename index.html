<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Purchasing Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',system-ui,sans-serif;background:#FFF9F5;color:#1A1008;min-height:100vh}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus{outline:none;border-color:#EE4D2D!important;box-shadow:0 0 0 3px #EE4D2D18}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#EE4D2D40;border-radius:10px}
.container{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.header{background:linear-gradient(135deg,#EE4D2D,#FF7337);padding:18px 24px 0;color:#fff}
.header-inner{max-width:1100px;margin:0 auto}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header-tabs{display:flex;gap:4px}
.tab-btn{border:none;border-radius:8px 8px 0 0;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;background:transparent;color:rgba(255,255,255,.8)}
.tab-btn.active{background:#fff;color:#EE4D2D}
.db-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #F0E6DE;flex-wrap:wrap}
.db-tab-btn{border:1.5px solid #F0E6DE;border-radius:8px 8px 0 0;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;background:transparent;color:#8C7B6E;margin-bottom:-2px}
.card{background:#fff;border-radius:14px;border:1.5px solid #F0E6DE;overflow:hidden;box-shadow:0 2px 14px rgba(238,77,45,.05);margin-bottom:12px}
.card-header{padding:10px 14px;display:flex;align-items:center;gap:8px}
.card-body{padding:12px 14px}
.session-wrap{border:2px solid #EE4D2D28;border-radius:18px;background:#FFF9F5;padding:16px;margin-bottom:20px}
.session-wrap.done{border-color:#00A65050;background:#F0FFF6}
.session-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.session-actions{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.stores-grid{display:grid;gap:12px}
.g1{grid-template-columns:1fr}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.item-grid{display:grid;grid-template-columns:1fr 90px 36px 22px;gap:4px;align-items:start;padding:6px 0;border-bottom:1px solid #F0E6DE}
.inp{border:1.5px solid #F0E6DE;border-radius:8px;padding:7px 10px;font-size:13px;color:#1A1008;background:#fff;width:100%}
.inp:disabled{background:#f5f5f5;color:#8C7B6E}
.inp-sm{border:1.5px solid #F0E6DE;border-radius:7px;padding:3px 6px;font-size:12px;color:#1A1008;width:100%}
.btn{border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:default}
.btn-sm{padding:5px 12px;font-size:12px}
.badge{border-radius:6px;font-size:11px;font-weight:700;padding:2px 8px;white-space:nowrap}
.slabel{font-size:10px;font-weight:800;color:#8C7B6E;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.sumbar{border-radius:12px;overflow:hidden;margin-top:14px;display:none}
.sumbody{padding:10px 14px}
.sumfoot{padding:10px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.sugg{position:absolute;top:100%;left:0;right:0;z-index:99;background:#fff;border:1.5px solid #EE4D2D30;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.1);max-height:140px;overflow-y:auto}
.sugg-item{padding:7px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #F0E6DE}
.sugg-item:hover{background:#FFF0EB}
.sched-pill{border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #F0E6DE;background:#fff;color:#8C7B6E}
.sched-pill.active{background:#EE4D2D;color:#fff;border-color:#EE4D2D}
.add-store-btn{border:2px dashed #EE4D2D35;border-radius:14px;background:transparent;color:#EE4D2D;font-weight:700;cursor:pointer;padding:24px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;min-height:100px;font-size:13px}
.add-sess-btn{margin-top:16px;width:100%;background:transparent;border:2px dashed #EE4D2D35;border-radius:14px;color:#EE4D2D;font-weight:700;font-size:14px;cursor:pointer;padding:14px}
.voucher-box{background:#FFFAF5;border:1.5px solid #EE4D2D25;border-radius:10px;padding:10px 12px;margin-top:8px}
.group-div{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.group-lbl{border-radius:20px;padding:4px 14px;font-weight:800;font-size:12px;white-space:nowrap}
.div-line{flex:1;height:1px;background:#F0E6DE}
.sync-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sync-btn{border:none;border-radius:10px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;color:#fff;display:flex;flex-direction:column;align-items:center;gap:4px}
.status-msg{border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none}
.guide-wrap{border:1.5px solid #34A85330;border-radius:12px;overflow:hidden}
.guide-toggle{width:100%;background:#34A85310;border:none;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:inherit;font-weight:700;color:#34A853;font-size:13px}
.guide-body{padding:14px 16px;display:none}
.guide-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.step-num{border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;color:#fff;background:#34A853}
.code-block{background:#1E1E2E;border-radius:10px;padding:12px 14px;margin-top:12px}
.code-pre{color:#E0E0F0;font-size:10px;line-height:1.6;overflow-x:auto;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.price-wrap{position:relative}
.price-icon{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.supp-card{border:1.5px solid #F0E6DE;border-radius:12px;overflow:hidden;margin-bottom:10px}
.supp-hd{background:#0F7B6C10;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ph-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;margin-bottom:3px}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #F0E6DE;background:#fff;color:#8C7B6E}
@media(max-width:640px){
  .header-top{gap:8px}
  .tab-btn{padding:8px 10px;font-size:11px}
  .session-actions{margin-left:0;width:100%}
  .session-actions .btn{flex:1}
  .g2,.g3{grid-template-columns:1fr!important}
  .form-grid{grid-template-columns:1fr!important}
  .item-grid{grid-template-columns:1fr 76px 32px 20px!important}
  .sync-btns{grid-template-columns:1fr!important}
  .db-tab-btn{padding:6px 9px;font-size:11px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const C={OR:'#EE4D2D',OL:'#FF7337',CR:'#FFF9F5',DK:'#1A1008',MU:'#8C7B6E',BO:'#F0E6DE',GR:'#00A650',YE:'#FFB800',PU:'#5433AB',WA:'#25D366',TE:'#0F7B6C',SH:'#34A853'};
// GAS Script URL - saved in localStorage
let SCRIPT_URL = localStorage.getItem('ppScriptUrl') || '';
const parsePrice=s=>{if(!s)return 0;const n=parseFloat(s.toString().replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
const fmtRp=n=>(!n&&n!==0)?'—':'Rp '+Math.round(n).toLocaleString('id-ID');
const genId=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});};
const DAY_NAMES=['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
function applyVoucher(sub,v){if(!v?.active)return 0;let d=0;if(v.pct>0)d=(sub*v.pct)/100;if(v.flat>0)d+=v.flat;if(sub<parsePrice(v.min))d=0;if(v.max>0)d=Math.min(d,parsePrice(v.max));return Math.max(0,d);}
const defaultStore=()=>({id:genId(),name:'',items:[],voucher:{active:false,pct:0,flat:0,min:0,max:0,label:''}});
const defaultSession=idx=>({id:genId(),label:'Sesi '+(idx+1),status:'draft',stores:[defaultStore(),defaultStore(),defaultStore()],createdAt:Date.now(),scheduleType:'none',scheduleDate:'',scheduleDay:1,scheduleMonthDay:1});
function fmtSchedule(s){if(s.scheduleType==='none')return null;if(s.scheduleType==='date'){if(!s.scheduleDate)return'📅 Tanggal belum diisi';return'📅 '+new Date(s.scheduleDate+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}if(s.scheduleType==='daily')return'🔁 Setiap Hari';if(s.scheduleType==='weekly')return'🔁 Setiap '+DAY_NAMES[(s.scheduleDay||1)-1];if(s.scheduleType==='monthly')return'🔁 Setiap Tgl '+(s.scheduleMonthDay||1);return null;}
function schedKey(s){if(s.scheduleType==='date'&&s.scheduleDate)return s.scheduleDate;if(s.scheduleType==='daily')return'ra-daily';if(s.scheduleType==='weekly')return'rb-weekly-'+String(s.scheduleDay).padStart(2,'0');if(s.scheduleType==='monthly')return'rc-monthly-'+String(s.scheduleMonthDay).padStart(2,'0');return'zz-none';}
async function fetchPrice(url){try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(7000)});const d=await r.json();const h=d.contents||'';const og=h.match(/<meta[^>]*property=["']og:price:amount["'][^>]*content=["']([0-9.,]+)["']/i);if(og)return parseFloat(og[1].replace(/,/g,''));const jp=h.match(/"price"\\s*:\\s*"?([0-9]+(?:\\.[0-9]+)?)"?/);if(jp)return parseFloat(jp[1]);return null;}catch{return null;}}
function buildWA(sess,idx){const lines=[];lines.push('🛒 *MISI CHECKOUT — Sesi '+(idx+1)+'*');if(sess.label&&sess.label!=='Sesi '+(idx+1))lines.push('📌 '+sess.label);const sc=fmtSchedule(sess);if(sc)lines.push('🗓 Jadwal: '+sc);lines.push('─────────────────────');sess.stores.forEach((st,si)=>{if(!st.items.length)return;const sub=st.items.reduce((s,it)=>s+parsePrice(it.price)*it.qty,0);const disc=applyVoucher(sub,st.voucher);lines.push('\\n🏪 *Toko '+(si+1)+': '+(st.name||'(nama toko)')+'*');st.items.forEach((it,ii)=>{lines.push((ii+1)+'. '+it.name);lines.push('   • Jumlah: '+it.qty+' pcs');lines.push('   • Link: '+it.link);});lines.push('   💰 Sebelum voucher: *'+fmtRp(sub)+'*');if(st.voucher.active){const parts=[];if(st.voucher.pct>0)parts.push(st.voucher.pct+'%');if(st.voucher.flat>0)parts.push('flat '+fmtRp(st.voucher.flat));if(st.voucher.min>0)parts.push('min. '+fmtRp(st.voucher.min));if(st.voucher.max>0)parts.push('maks. '+fmtRp(st.voucher.max));lines.push('   🎟 Voucher: *'+(st.voucher.label||'Voucher')+'* _('+parts.join(', ')+'_');if(disc>0)lines.push('   ✅ Hemat: '+fmtRp(disc)+' → Bayar: *'+fmtRp(sub-disc)+'*');}});const totB=sess.stores.reduce((s,st)=>s+st.items.reduce((ss,it)=>ss+parsePrice(it.price)*it.qty,0),0);const totD=sess.stores.reduce((s,st)=>{const sub=st.items.reduce((ss,it)=>ss+parsePrice(it.price)*it.qty,0);return s+applyVoucher(sub,st.voucher);},0);lines.push('\\n─────────────────────');lines.push('💳 *Total Sesi Ini:*');lines.push('   Sebelum voucher: '+fmtRp(totB));if(totD>0)lines.push('   Total hemat: −'+fmtRp(totD));lines.push('   *Yang harus dibayar: '+fmtRp(totB-totD)+'*');lines.push('\\nMohon segera di-checkout ya! Terima kasih 🙏');return lines.join('\\n');}

// State
const S={
  db:JSON.parse(localStorage.getItem('ppDb')||'[]'),
  supp:JSON.parse(localStorage.getItem('ppSupp')||'[]'),
  sess:JSON.parse(localStorage.getItem('ppSess')||'null')||[defaultSession(0)],
  tab:'plan',dbtab:'ecom',filter:'all'
};
function save(){localStorage.setItem('ppDb',JSON.stringify(S.db));localStorage.setItem('ppSupp',JSON.stringify(S.supp));localStorage.setItem('ppSess',JSON.stringify(S.sess));}
function addToDb(item){if(!item.name?.trim()||!item.link?.trim())return;const pl=item.link.includes('tokopedia')?'tokopedia':'shopee';const ex=S.db.find(d=>d.name.toLowerCase()===item.name.toLowerCase());if(ex){if(!ex.links?.some(l=>l.url===item.link)){ex.links=ex.links||[];ex.links.push({url:item.link,price:item.price,platform:pl});}}else{S.db.push({id:genId(),name:item.name,links:[{url:item.link,price:item.price,platform:pl}]});}}

// DOM helpers
function el(tag,cls,...kids){const e=document.createElement(tag);if(cls)e.className=cls;for(const k of kids){if(k==null||k===false)continue;if(typeof k==='string'||typeof k==='number')e.appendChild(document.createTextNode(String(k)));else if(k instanceof Node)e.appendChild(k);else if(Array.isArray(k))k.forEach(x=>{if(x instanceof Node)e.appendChild(x);else if(x!=null)e.appendChild(document.createTextNode(String(x)));});}return e;}
function s(tag,style,...kids){const e=el(tag,null,...kids);Object.assign(e.style,style);return e;}
function inp(type,val,ph,cb,extra={}){const i=document.createElement('input');i.type=type;i.className='inp';i.placeholder=ph||'';i.value=val??'';Object.assign(i,extra);i.addEventListener('input',e=>cb(e.target.value));return i;}
function btn(lbl,cb,color,ghost=false,sm=false){const b=el('button','btn'+(sm?' btn-sm':''));b.style.background=ghost?'transparent':color;b.style.color=ghost?color:'#fff';if(ghost)b.style.border='1.5px solid '+color+'50';if(typeof lbl==='string')b.textContent=lbl;else b.appendChild(lbl);b.addEventListener('click',cb);return b;}
function badge(txt,color){const b=el('span','badge');b.style.background=color+'18';b.style.color=color;b.style.border='1px solid '+color+'40';b.textContent=txt;return b;}
function slabel(txt){const d=el('div','slabel');d.textContent=txt;return d;}

// ── Sync with Sheets ──
async function pushData(){
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'push',ecommerceDb:S.db,suppliers:S.supp,sessions:S.sess}),redirect:'follow'});
    const d=await r.json();
    return d.ok?{ok:true}:{ok:false,err:d.error};
  }catch(e){return{ok:false,err:e.message};}
}
async function pullData(){
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'pull'}),redirect:'follow'});
    const d=await r.json();
    if(!d.ok)return{ok:false,err:d.error};
    if(d.ecommerceDb?.length)S.db=d.ecommerceDb.map(x=>({...x,links:x.links||[]}));
    if(d.suppliers?.length)S.supp=d.suppliers;
    if(d.sessions?.length)S.sess=d.sessions;
    save();return{ok:true,counts:{db:d.ecommerceDb?.length||0,supp:d.suppliers?.length||0,sess:d.sessions?.length||0}};
  }catch(e){return{ok:false,err:e.message};}
}

// ── Voucher Editor ──
function renderVoucher(v,onChange,ro){
  const box=el('div','voucher-box');
  const row=el('div',null);row.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px';
  const chk=document.createElement('input');chk.type='checkbox';chk.checked=!!v.active;chk.disabled=ro;chk.style.accentColor=C.OR;chk.style.cssText+='width:15px;height:15px;cursor:'+(ro?'default':'pointer');
  chk.addEventListener('change',e=>onChange({...v,active:e.target.checked}));
  row.append(chk,s('span',{fontWeight:700,fontSize:'13px',color:C.OR},'🎟 Voucher Toko'));
  box.appendChild(row);
  if(v.active){
    const g=el('div',null);g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px';
    [['Label Voucher','label','text','1/-1'],['Diskon %','pct','number',null],['Flat (Rp)','flat','number',null],['Min. Belanja','min','number',null],['Maks. Voucher','max','number',null]].forEach(([lbl,key,type,col])=>{
      const lb=el('label',null);lb.style.cssText='font-size:11px;color:#8C7B6E;display:flex;flex-direction:column;gap:2px';if(col)lb.style.gridColumn=col;
      lb.appendChild(document.createTextNode(lbl));
      const fi=inp(type,v[key],lbl,val=>onChange({...v,[key]:type==='number'?+val:val}));if(ro)fi.disabled=true;
      lb.appendChild(fi);g.appendChild(lb);
    });
    box.appendChild(g);
  }
  return box;
}

// ── Store Card ──
function renderStore(store,sessId,si,ro){
  const card=el('div','card');
  const hd=el('div','card-header');
  hd.style.background=ro?'linear-gradient(135deg,#bbb,#999)':'linear-gradient(135deg,#EE4D2D,#FF7337)';
  hd.style.borderRadius='12px 12px 0 0';
  const ni=document.createElement('input');ni.value=store.name;ni.placeholder='Nama Toko';ni.disabled=ro;ni.style.cssText='background:transparent;border:none;outline:none;color:#fff;font-weight:800;font-size:14px;font-family:inherit;flex:1';
  ni.addEventListener('input',e=>{const sess=S.sess.find(x=>x.id===sessId);if(sess){sess.stores[si].name=e.target.value;save();}});
  hd.append(s('span',{},'🏪'),ni);
  if(!ro){const db=s('button',{background:'rgba(0,0,0,.18)',border:'none',borderRadius:'5px',color:'#fff',cursor:'pointer',fontSize:'12px',padding:'2px 7px'},'✕');db.addEventListener('click',()=>{const sess=S.sess.find(x=>x.id===sessId);if(sess){sess.stores.splice(si,1);save();render();}});hd.appendChild(db);}
  card.appendChild(hd);
  const body=el('div','card-body');

  const itemsEl=el('div',null);itemsEl.style.marginBottom='8px';
  const subtotalEl=el('div',null);subtotalEl.style.cssText='margin-top:8px;background:#FFF9F5;border-radius:8px;padding:8px 11px;display:none';
  const voucherEl=el('div',null);

  const repaint=()=>{
    const sess=S.sess.find(x=>x.id===sessId);const st=sess?.stores[si];if(!st)return;
    // items
    itemsEl.replaceChildren();
    if(st.items.length){
      const hrow=el('div','item-grid');hrow.style.cssText='padding-bottom:4px;border-bottom:2px solid #F0E6DE;margin-bottom:2px';
      ['Barang','Harga (Rp)','Qty',''].forEach(h=>{const d=el('div',null,h);d.style.cssText='font-size:10px;font-weight:800;color:#8C7B6E;text-transform:uppercase';hrow.appendChild(d);});
      itemsEl.appendChild(hrow);
      st.items.forEach((it,ii)=>{
        const row=el('div','item-grid');
        const nd=el('div',null);
        const pl=it.link?.includes('tokopedia')?{l:'Tokopedia',c:'#42B549'}:it.link?.includes('shopee')?{l:'Shopee',c:C.OR}:null;
        const ns=s('span',{fontWeight:700,fontSize:'12px',color:C.DK},it.name);
        nd.appendChild(ns);
        if(pl){const pb=s('span',{fontSize:'9px',background:pl.c+'18',color:pl.c,borderRadius:'4px',padding:'1px 5px',fontWeight:700,marginLeft:'4px'},pl.l);nd.appendChild(pb);}
        const la=document.createElement('a');la.href=it.link;la.target='_blank';la.style.cssText='font-size:10px;color:#EE4D2D;display:block;word-break:break-all';la.textContent='🔗 '+(it.link.length>28?it.link.slice(0,28)+'…':it.link);
        nd.appendChild(la);
        // price cell - click to edit
        const pc=el('div',null);
        const showPriceDisplay=()=>{
          const pd=s('div',{border:'1.5px solid #F0E6DE',borderRadius:'7px',padding:'3px 6px',fontSize:'12px',cursor:'pointer',background:'#FAFAFA',display:'flex',justifyContent:'space-between',gap:'2px'});
          pd.append(s('span',{},it.price?it.price.toLocaleString('id-ID'):'—'),s('span',{fontSize:'9px',color:C.MU},'✏'));
          pd.title='Klik edit harga';
          pd.addEventListener('click',()=>{
            const pi=document.createElement('input');pi.type='number';pi.className='inp-sm';pi.value=it.price||'';
            pc.replaceChildren(pi);pi.focus();
            const sv=()=>{it.price=parsePrice(pi.value);addToDb(it);save();repaintSummary();showPriceDisplay();pc.replaceChildren(pd2);};
            let pd2=pd;pc.replaceChildren(pi);
            pi.addEventListener('blur',sv);pi.addEventListener('keydown',e=>{if(e.key==='Enter')sv();});
          });
          pc.replaceChildren(pd);
        };
        showPriceDisplay();
        const qi=document.createElement('input');qi.type='number';qi.className='inp-sm';qi.style.textAlign='center';qi.value=it.qty||1;qi.min=1;
        qi.addEventListener('input',e=>{it.qty=+e.target.value||1;save();repaintSummary();});

    }
    // subtotal
    const sub=st.items.reduce((s,it)=>s+parsePrice(it.price)*it.qty,0);
    const disc=applyVoucher(sub,st.voucher);
    if(sub>0){

        s('div',{display:'flex',justifyContent:'space-between',fontSize:'11px',color:C.MU,marginBottom:'2px'},s('span',{},(st.items.reduce((s,i)=>s+i.qty,0))+' item'),s('span',{},fmtRp(sub))),
        ...(disc>0?[s('div',{display:'flex',justifyContent:'space-between',fontSize:'11px',color:C.GR,marginBottom:'2px'},s('span',{},'🎟 '+(st.voucher.label||'Voucher')),s('span',{},'−'+fmtRp(disc)))]:[]),

      );
    } else subtotalEl.style.display='none';
    // voucher
    voucherEl.replaceChildren(renderVoucher(st.voucher,v=>{st.voucher=v;save();repaint();repaintSummary();},ro));
  };

  const repaintSummary=()=>{
    const sel=document.getElementById('sum-'+sessId);if(!sel)return;
    const sess=S.sess.find(x=>x.id===sessId);if(!sess)return;
    const stats=sess.stores.filter(st=>st.items.length>0).map(st=>{const sub=st.items.reduce((s,it)=>s+parsePrice(it.price)*it.qty,0);const disc=applyVoucher(sub,st.voucher);return{name:st.name,sub,disc,after:sub-disc};});
    const totB=stats.reduce((s,t)=>s+t.sub,0);const totD=stats.reduce((s,t)=>s+t.disc,0);const totA=totB-totD;

      const row=s('div',{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'12px',padding:'4px 0',borderBottom:i<stats.length-1?'1px dashed #F0E6DE':'none'});
      row.appendChild(s('span',{color:C.DK,fontWeight:600},'🏪 '+(st.name||'Toko '+(i+1))));
      const pr=s('span',{display:'flex',gap:'10px',alignItems:'center'});
      if(st.disc>0)pr.append(s('span',{color:C.MU,textDecoration:'line-through',fontSize:'11px'},fmtRp(st.sub)),s('span',{color:C.GR,fontSize:'11px',fontWeight:700},'−'+fmtRp(st.disc)));
      pr.appendChild(s('span',{color:C.DK,fontWeight:800},fmtRp(st.after)));

    }));
    const sf=sel.querySelector('.sumfoot');
    sf.style.background=isDone?'linear-gradient(135deg,#00A650,#00C855)':'linear-gradient(135deg,#EE4D2D,#FF7337)';
    sf.replaceChildren(
      s('div',{fontSize:'12px',opacity:'.92'},'Sebelum voucher: ',s('b',{},fmtRp(totB)),...(totD>0?[' · Hemat: ',s('b',{},fmtRp(totD))]:[]))
    );
    const tot=s('div',{display:'flex',alignItems:'baseline',gap:'6px'});
    tot.append(s('span',{fontSize:'12px',opacity:'.85'},'Total yang dibayar:'),s('span',{fontWeight:900,fontSize:'20px'},fmtRp(totA)));
    sf.appendChild(tot);
  };

  // Add item form
  if(!ro){
    let ni2={name:'',link:'',price:'',qty:1},fs=null;
    const form=el('div',null);form.style.marginTop='8px';form.appendChild(slabel('Tambah Barang'));
    const grid=el('div','form-grid');
    // name + suggestions
    const nw=s('div',{position:'relative'});
    const nf=inp('text',ni2.name,'Nama barang',v=>{
      ni2.name=v;
      const m=S.db.filter(d=>d.name.toLowerCase().includes(v.toLowerCase()));
      sb2.replaceChildren();
      if(v&&m.length){m.forEach(d=>{const it2=el('div','sugg-item');it2.textContent=d.name;if(d.links?.length)it2.appendChild(s('span',{color:C.MU,fontSize:'11px'},' · '+d.links.length+' link'));it2.addEventListener('click',()=>{const best=d.links?.[0];ni2.name=d.name;ni2.link=best?.url||'';ni2.price=String(best?.price||'');nf.value=d.name;lf.value=best?.url||'';pf.value=best?.price||'';fs=best?.price?'ok':null;updIcon();sb2.replaceChildren();});sb2.appendChild(it2);});nw.appendChild(sb2);}else sb2.remove();
    });
    const sb2=el('div','sugg');nw.appendChild(nf);
    // link
    const lf=inp('text',ni2.link,'Link Shopee / Tokopedia',v=>{
      ni2.link=v;ni2.price='';pf.value='';fs=null;updIcon();
      if(v&&(v.includes('shopee')||v.includes('tokopedia'))){fs='load';updIcon();fetchPrice(v).then(p=>{if(p&&p>0){ni2.price=String(p);pf.value=String(p);fs='ok';}else fs='fail';updIcon();});}
    });
    // price
    const pw=el('div','price-wrap');
    const pf=inp('number',ni2.price,'Harga — otomatis/manual',v=>{ni2.price=v;fs='man';updIcon();});
    const pi2=el('span','price-icon');
    const updIcon=()=>{if(fs==='load')pi2.textContent='⏳';else if(fs==='ok'){pi2.textContent='✓';pi2.style.color=C.GR;}else if(fs==='fail'){pi2.textContent='⚠';pi2.style.color=C.YE;}else if(fs==='man'){pi2.textContent='✏';pi2.style.color=C.PU;}else pi2.textContent='';};
    pw.append(pf,pi2);
    const qf=inp('number','1','Qty',v=>{ni2.qty=+v||1;});
    grid.append(nw,lf,pw,qf);
    const ab=btn('+ Tambah Barang',()=>{
      if(!ni2.name.trim()||!ni2.link.trim())return;
      const sess=S.sess.find(x=>x.id===sessId);const st2=sess?.stores[si];if(!st2)return;
      const item={id:genId(),name:ni2.name,link:ni2.link,price:parsePrice(ni2.price),qty:ni2.qty||1};
      st2.items.push(item);addToDb(item);save();
      ni2={name:'',link:'',price:'',qty:1};nf.value='';lf.value='';pf.value='';qf.value='1';fs=null;updIcon();
      repaint();repaintSummary();
    },C.OR);ab.style.width='100%';ab.style.marginTop='5px';
    form.append(grid,ab);body.appendChild(form);
  }
  body.append(itemsEl,voucherEl,subtotalEl);card.appendChild(body);repaint();
  return{card,repaintSummary};
}

  acts.append(shareB,doneB,delB);

  if(sess.scheduleType==='weekly'&&!isDone){const sel=document.createElement('select');sel.style.cssText='border:1.5px solid #EE4D2D60;border-radius:8px;padding:3px 8px;font-size:12px';DAY_NAMES.forEach((d,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=d;if(sess.scheduleDay===i+1)o.selected=true;sel.appendChild(o);});sel.addEventListener('change',e=>{sess.scheduleDay=+e.target.value;save();render();});spw.appendChild(sel);}
  if(sess.scheduleType==='monthly'&&!isDone){const sel=document.createElement('select');sel.style.cssText='border:1.5px solid #EE4D2D60;border-radius:8px;padding:3px 8px;font-size:12px';for(let i=1;i<=31;i++){const o=document.createElement('option');o.value=i;o.textContent='Tanggal '+i;if(sess.scheduleMonthDay===i)o.selected=true;sel.appendChild(o);}sel.addEventListener('change',e=>{sess.scheduleMonthDay=+e.target.value;save();render();});spw.appendChild(sel);}
  sw.appendChild(spw);wrap.appendChild(sw);
  if(isDone){
    const totB=sess.stores.reduce((s,st)=>s+st.items.reduce((ss,it)=>ss+parsePrice(it.price)*it.qty,0),0);
    const totD=sess.stores.reduce((s,st)=>{const sub=st.items.reduce((ss,it)=>ss+parsePrice(it.price)*it.qty,0);return s+applyVoucher(sub,st.voucher);},0);

    if(totD>0)di2.appendChild(s('span',{fontSize:'12px',color:C.GR},'Hemat: '+fmtRp(totD)));
    wrap.appendChild(di2);
  }
  const gc=Math.min(Math.max(sess.stores.length,1),3);
  const grid=el('div','stores-grid g'+gc);
  sess.stores.forEach((st,si2)=>{const{card}=renderStore(st,sess.id,si2,isDone);grid.appendChild(card);});
  if(!isDone&&sess.stores.length<3){const ab=el('button','add-store-btn');ab.append(s('span',{fontSize:'26px'},'+'),'Tambah Toko');ab.addEventListener('click',()=>{sess.stores.push(defaultStore());save();render();});grid.appendChild(ab);}
  wrap.appendChild(grid);
  const sumEl=el('div','sumbar');sumEl.id='sum-'+sess.id;const _sb=el('div','sumbody');_sb.style.background=isDone?'#F6FFFA':'#FFF9F5';const _sf=el('div','sumfoot');sumEl.append(_sb,_sf);
  wrap.appendChild(sumEl);
  setTimeout(()=>{const tmp=renderStore(sess.stores[0]||defaultStore(),sess.id,0,isDone);tmp.repaintSummary();},0);
  return wrap;
}

        if(lat)ih.appendChild(s('span',{fontSize:'13px',color:C.GR,fontWeight:700},fmtRp(lat.price)));
        if(item.priceHistory?.length)ih.appendChild(s('span',{fontSize:'10px',color:C.MU},'('+item.priceHistory.length+' riwayat)'));
        ih.append(s('span',{color:C.MU,fontSize:'12px'},isExp?'▲':'▼'));
        const di=s('button',{background:'none',border:'none',cursor:'pointer',color:'#ccc',fontSize:'13px'},'🗑');
        di.addEventListener('click',e=>{e.stopPropagation();supp.items=supp.items.filter(i=>i.id!==item.id);save();repaint();});
        ih.append(di);ih.addEventListener('click',()=>{expKey=isExp?null:key;repaint();});ic.appendChild(ih);
        if(isExp){
          const ex=s('div',{padding:'10px 12px',borderTop:'1px solid #F0E6DE'});
          if((item.priceHistory||[]).length){
            ex.appendChild(slabel('Riwayat Harga (terbaru di atas)'));
            const hl=el('div',null);hl.style.cssText='display:flex;flex-direction:column;gap:3px;margin-bottom:10px';
            [...item.priceHistory].reverse().forEach((ph,phi)=>{
              const isL=phi===0;
              const row=el('div','ph-row');row.style.cssText+='background:'+(isL?C.GR+'10':'#f9f9f9')+';border:1px solid '+(isL?C.GR+'30':C.BO);
              row.append(s('span',{fontSize:'11px',color:C.MU,minWidth:'80px'},fmtDate(ph.date)),s('span',{fontWeight:700,color:isL?C.GR:C.DK,fontSize:'13px',flex:1},fmtRp(ph.price)));
              if(isL)row.appendChild(badge('Terkini',C.GR));
              const dp=s('button',{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'#ccc',fontSize:'12px'},'✕');
              dp.addEventListener('click',()=>{item.priceHistory.splice(item.priceHistory.length-1-phi,1);save();repaint();});
              row.appendChild(dp);hl.appendChild(row);
            });
            ex.appendChild(hl);
          }
          ex.appendChild(slabel('Update Harga Terbaru'));
          const pr=s('div',{display:'flex',gap:'6px',alignItems:'center'});
          const pf=inp('number',newPR[key]||'','Harga baru (Rp)',v=>{newPR[key]=v;});pf.style.flex='1';
          const tl=s('span',{fontSize:'11px',color:C.MU,whiteSpace:'nowrap'},'📅 '+fmtDate(todayStr()));
          const ab=btn('+ Input',()=>{const val=parsePrice(newPR[key]||'');if(!val)return;if(!item.priceHistory)item.priceHistory=[];item.priceHistory.push({date:todayStr(),price:val});newPR[key]='';save();repaint();},C.TE,false,true);
          pr.append(pf,tl,ab);ex.appendChild(pr);ic.appendChild(ex);
        }
        ib.appendChild(ic);
      });
      const air=s('div',{display:'flex',gap:'6px',marginTop:'6px'});
      const nif=inp('text',newIN[supp.id]||'','Tambah barang untuk supplier ini',v=>{newIN[supp.id]=v;});
      const nib=btn('+ Barang',()=>{const name=(newIN[supp.id]||'').trim();if(!name)return;if(!supp.items)supp.items=[];supp.items.push({id:genId(),name,priceHistory:[]});newIN[supp.id]='';save();repaint();},C.TE,true,true);
      air.append(nif,nib);ib.appendChild(air);sc.appendChild(ib);listEl.appendChild(sc);
    });
  };
  const af=s('div',{background:'#F0FDFB',border:'1.5px solid #0F7B6C20',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px'});
  af.appendChild(slabel('Tambah Supplier Baru'));
  const ag=s('div',{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:'8px'});
  const snf=inp('text',newS.name,'Nama perusahaan / supplier',v=>{newS.name=v;});
  const spf=inp('text',newS.phone,'No. WA / HP',v=>{newS.phone=v;});
  const sab=btn('+ Tambah',()=>{if(!newS.name.trim())return;S.supp.push({id:genId(),name:newS.name.trim(),phone:newS.phone.trim(),items:[]});save();newS={name:'',phone:''};snf.value='';spf.value='';repaint();},C.TE);
  ag.append(snf,spf,sab);af.appendChild(ag);
  const sf=inp('text',search,'🔍 Cari supplier atau barang...',v=>{search=v;repaint();});sf.style.marginBottom='12px';
  body.append(af,sf,listEl);wrap.appendChild(body);repaint();return wrap;
}

// ── Sheets Panel ──
function renderSheetsPanel(){
  const wrap=el('div','card');
  const hd=el('div','card-header');hd.style.background='linear-gradient(135deg,#34A853,#2E8B47)';
  hd.append(s('span',{fontSize:'18px'},'📊'),s('span',{color:'#fff',fontWeight:800,fontSize:'15px',flex:1},'Sinkronisasi Google Sheets'),badge('✓ Terhubung Otomatis','#A8F0B8'));
  wrap.appendChild(hd);
  const body=el('div','card-body');
  const info=s('div',{background:'#F0FDF4',border:'1.5px solid #34A85330',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px',fontSize:'13px',lineHeight:'1.7'});
  info.innerHTML='🎉 <b>Kamu sudah terhubung!</b> App ini berjalan langsung di Google Apps Script, jadi Push & Pull bekerja otomatis tanpa konfigurasi tambahan.';
  const stEl=el('div','status-msg');
  const sg=el('div','sync-btns');
  const pb=el('button','sync-btn');pb.style.background=C.SH;pb.append(s('span',{fontSize:'22px'},'⬆'),s('span',{},'Push ke Sheets'),s('span',{fontSize:'11px',fontWeight:400,opacity:'.85'},'App → Google Sheets'));
  pb.addEventListener('click',async()=>{
    pb.style.background='#ccc';pu.style.background='#ccc';pb.children[1].textContent='Mengirim...';stEl.style.display='none';
    const r=await pushData();
    pb.style.background=C.SH;pu.style.background=C.PU;pb.children[1].textContent='Push ke Sheets';
    stEl.style.display='block';stEl.style.background=r.ok?C.GR+'12':'#FFEEEE';stEl.style.color=r.ok?C.GR:'#CC0000';stEl.style.border='1.5px solid '+(r.ok?C.GR:'#CC0000')+'30';
    stEl.textContent=r.ok?'✅ Data berhasil dikirim ke Google Sheets!':'❌ Gagal: '+(r.err||'Error');
  });
  const pu=el('button','sync-btn');pu.style.background=C.PU;pu.append(s('span',{fontSize:'22px'},'⬇'),s('span',{},'Pull dari Sheets'),s('span',{fontSize:'11px',fontWeight:400,opacity:'.85'},'Google Sheets → App'));
  pu.addEventListener('click',async()=>{
    pb.style.background='#ccc';pu.style.background='#ccc';pu.children[1].textContent='Mengambil...';stEl.style.display='none';
    const r=await pullData();
    pb.style.background=C.SH;pu.style.background=C.PU;pu.children[1].textContent='Pull dari Sheets';
    stEl.style.display='block';stEl.style.background=r.ok?C.GR+'12':'#FFEEEE';stEl.style.color=r.ok?C.GR:'#CC0000';stEl.style.border='1.5px solid '+(r.ok?C.GR:'#CC0000')+'30';
    stEl.textContent=r.ok?'✅ Import berhasil! ('+r.counts.db+' barang, '+r.counts.supp+' supplier, '+r.counts.sess+' sesi)':'❌ Gagal: '+(r.err||'Error');
    if(r.ok)setTimeout(()=>render(),600);
  });
  sg.append(pb,pu);body.append(info,sg,stEl);wrap.appendChild(body);return wrap;
}

// ── Main render ──
function render(){
  const app=document.getElementById('app');
  const root=document.createElement('div');
  // Header
  const hdr2=el('div','header');
  const hi=el('div','header-inner');
  const ht=el('div','header-top');
  ht.append(s('div',{fontSize:'32px'},'🛍️'),s('div',{},s('div',{fontWeight:900,fontSize:'22px',letterSpacing:'-.5px'},'Purchasing Planner'),s('div',{fontSize:'12px',opacity:'.85'},'E-Commerce · Supplier Langsung · Sinkron Google Sheets')));
  const tabs=el('div','header-tabs');
  [['plan','📋 Rencana Belanja'],['db','🗄️ Database & Supplier']].forEach(([key,lbl])=>{
    const t=el('button','tab-btn'+(S.tab===key?' active':''));t.textContent=lbl;t.addEventListener('click',()=>{S.tab=key;render();});tabs.appendChild(t);
  });
  hi.append(ht,tabs);hdr2.appendChild(hi);root.appendChild(hdr2);
  // Content
  const cont=el('div','container');
  if(S.tab==='plan'){
    const fb=el('div','filter-bar');
    const dc=S.sess.filter(s=>s.status==='done').length;const drc=S.sess.filter(s=>s.status==='draft').length;
    [['all','Semua ('+S.sess.length+')'],['draft','📝 Draft ('+drc+')'],['done','✅ Selesai ('+dc+')']].forEach(([val,lbl])=>{
      const b=el('button','filter-btn');b.textContent=lbl;if(S.filter===val){b.style.background=C.OR;b.style.color='#fff';b.style.borderColor=C.OR;}
      b.addEventListener('click',()=>{S.filter=val;render();});fb.appendChild(b);
    });
    cont.appendChild(fb);
    const vis=S.sess.filter(s=>S.filter==='all'||s.status===S.filter).slice().sort((a,b)=>schedKey(a).localeCompare(schedKey(b)));
    vis.forEach((sess,si)=>{
      let gl=null;const prev=vis[si-1];
      if(sess.scheduleType==='none'&&(si===0||prev?.scheduleType!=='none'))gl='⏳ Tanpa Jadwal';
      else if(sess.scheduleType==='date'){const td=sess.scheduleDate||'';if(si===0||prev?.scheduleType!=='date'||td!==(prev?.scheduleDate||'')){if(!td&&(si===0||prev?.scheduleType!=='date'))gl='📅 Tanggal Belum Ditentukan';else if(td)gl='📅 '+new Date(td+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}}
      else if(sess.scheduleType==='daily'&&prev?.scheduleType!=='daily')gl='🔁 Setiap Hari';
      else if(sess.scheduleType==='weekly'&&(prev?.scheduleType!=='weekly'||prev?.scheduleDay!==sess.scheduleDay))gl='🔁 Setiap '+DAY_NAMES[(sess.scheduleDay||1)-1];
      else if(sess.scheduleType==='monthly'&&(prev?.scheduleType!=='monthly'||prev?.scheduleMonthDay!==sess.scheduleMonthDay))gl='🔁 Setiap Tanggal '+(sess.scheduleMonthDay||1);
      if(gl){const dv=el('div','group-div');dv.style.marginTop=si>0?'8px':'0';const lb=el('div','group-lbl');lb.style.background=sess.scheduleType==='none'?'#eee':sess.scheduleType==='date'?C.PU+'18':C.OR+'15';lb.style.color=sess.scheduleType==='none'?C.MU:sess.scheduleType==='date'?C.PU:C.OR;lb.textContent=gl;dv.append(lb,el('div','div-line'));cont.appendChild(dv);}
      cont.appendChild(renderSession(sess,S.sess.indexOf(sess)));
    });
    if(!vis.length)cont.appendChild(s('div',{textAlign:'center',color:C.MU,padding:'40px',fontSize:'14px'},'Tidak ada sesi dengan status ini.'));
    const asb=el('button','add-sess-btn');asb.textContent='+ Tambah Sesi Checkout Baru';asb.addEventListener('click',()=>{S.sess.push(defaultSession(S.sess.length));save();render();});
    cont.appendChild(asb);
  }
  if(S.tab==='db'){
    const dbt=el('div','db-tabs');
    [['ecom','🛍️ E-Commerce',C.PU],['supp','🏭 Supplier',C.TE],['sheets','📊 Google Sheets',C.SH]].forEach(([key,lbl,color])=>{
      const t=el('button','db-tab-btn');t.textContent=lbl;if(S.dbtab===key){t.style.background=color;t.style.color='#fff';t.style.borderColor=color;}
      t.addEventListener('click',()=>{S.dbtab=key;render();});dbt.appendChild(t);
    });
    cont.appendChild(dbt);
    if(S.dbtab==='ecom')cont.appendChild(renderEcomDb());
    if(S.dbtab==='supp')cont.appendChild(renderSuppDb());
    if(S.dbtab==='sheets')cont.appendChild(renderSheetsPanel());
  }
  root.appendChild(cont);
  app.replaceChildren(root);
}
render();
</script>
