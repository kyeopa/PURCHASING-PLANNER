<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Purchasing Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',system-ui,sans-serif;background:#FFF9F5;color:#1A1008;min-height:100vh}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus{outline:none;border-color:#EE4D2D!important;box-shadow:0 0 0 3px #EE4D2D18}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#EE4D2D40;border-radius:10px}
.container{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.header{background:linear-gradient(135deg,#EE4D2D,#FF7337);padding:18px 24px 0;color:#fff}
.hi{max-width:1100px;margin:0 auto}
.ht{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.htabs{display:flex;gap:4px}
.tab-btn{border:none;border-radius:8px 8px 0 0;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;background:transparent;color:rgba(255,255,255,.8)}
.tab-btn.active{background:#fff;color:#EE4D2D}
.dbt{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #F0E6DE;flex-wrap:wrap}
.dbt-btn{border:1.5px solid #F0E6DE;border-radius:8px 8px 0 0;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;background:transparent;color:#8C7B6E;margin-bottom:-2px}
.card{background:#fff;border-radius:14px;border:1.5px solid #F0E6DE;overflow:hidden;box-shadow:0 2px 14px rgba(238,77,45,.05);margin-bottom:12px}
.ch{padding:10px 14px;display:flex;align-items:center;gap:8px}
.cb{padding:12px 14px}
.sw{border:2px solid #EE4D2D28;border-radius:18px;background:#FFF9F5;padding:16px;margin-bottom:20px}
.sw.done{border-color:#00A65050;background:#F0FFF6}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sa{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.sg{display:grid;gap:12px}
.g1{grid-template-columns:1fr}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.ig{display:grid;grid-template-columns:1fr 90px 36px 22px;gap:4px;align-items:start;padding:6px 0;border-bottom:1px solid #F0E6DE}.ig-price{display:flex;flex-direction:column;gap:3px}
.inp{border:1.5px solid #F0E6DE;border-radius:8px;padding:7px 10px;font-size:13px;color:#1A1008;background:#fff;width:100%}
.inp:disabled{background:#f5f5f5;color:#8C7B6E}
.inp-sm{border:1.5px solid #F0E6DE;border-radius:7px;padding:3px 6px;font-size:12px;color:#1A1008;width:100%}
.btn{border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer}
.btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:default}
.btn-sm{padding:5px 12px;font-size:12px}
.badge{border-radius:6px;font-size:11px;font-weight:700;padding:2px 8px;white-space:nowrap}
.sl{font-size:10px;font-weight:800;color:#8C7B6E;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.sb{border-radius:12px;overflow:hidden;margin-top:14px;display:none}
.sbd{padding:10px 14px}
.sbf{padding:10px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.mb{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.sug{position:absolute;top:100%;left:0;right:0;z-index:99;background:#fff;border:1.5px solid #EE4D2D30;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.1);max-height:140px;overflow-y:auto}
.si{padding:7px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #F0E6DE}
.si:hover{background:#FFF0EB}
.sp{border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #F0E6DE;background:#fff;color:#8C7B6E}
.sp.active{background:#EE4D2D;color:#fff;border-color:#EE4D2D}
.asb{border:2px dashed #EE4D2D35;border-radius:14px;background:transparent;color:#EE4D2D;font-weight:700;cursor:pointer;padding:24px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;min-height:100px;font-size:13px}
.addss{margin-top:16px;width:100%;background:transparent;border:2px dashed #EE4D2D35;border-radius:14px;color:#EE4D2D;font-weight:700;font-size:14px;cursor:pointer;padding:14px}
.vbox{background:#FFFAF5;border:1.5px solid #EE4D2D25;border-radius:10px;padding:10px 12px;margin-top:8px}
.gdiv{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gl{border-radius:20px;padding:4px 14px;font-weight:800;font-size:12px;white-space:nowrap}
.dl{flex:1;height:1px;background:#F0E6DE}
.sync-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sync-btn{border:none;border-radius:10px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;color:#fff;display:flex;flex-direction:column;align-items:center;gap:4px}
.stmsg{border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:none}
.gtog{width:100%;background:#34A85310;border:none;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:inherit;font-weight:700;color:#34A853;font-size:13px}
.ph{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;margin-bottom:3px}
.fb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb-btn{border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #F0E6DE;background:#fff;color:#8C7B6E}
.pw{position:relative}
.pi2{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.sc-card{border:1.5px solid #F0E6DE;border-radius:12px;overflow:hidden;margin-bottom:10px}
.sc-hd{background:#0F7B6C10;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
@media(max-width:640px){
  .ht{gap:8px}.tab-btn{padding:8px 10px;font-size:11px}
  .sa{margin-left:0;width:100%}.sa .btn{flex:1}
  .g2,.g3{grid-template-columns:1fr!important}
  .fg{grid-template-columns:1fr!important}
  .ig{grid-template-columns:1fr 76px 32px 20px!important}
  .sync-btns{grid-template-columns:1fr!important}
  .dbt-btn{padding:6px 9px;font-size:11px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const C={OR:'#EE4D2D',OL:'#FF7337',CR:'#FFF9F5',DK:'#1A1008',MU:'#8C7B6E',BO:'#F0E6DE',GR:'#00A650',YE:'#FFB800',PU:'#5433AB',WA:'#25D366',TE:'#0F7B6C',SH:'#34A853'};
let SCRIPT_URL=localStorage.getItem('ppScriptUrl')||'';
const parsePrice=s=>{if(!s)return 0;const n=parseFloat(s.toString().replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
const fmtRp=n=>(!n&&n!==0)?'—':'Rp '+Math.round(n).toLocaleString('id-ID');
const genId=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});};
const DAY_NAMES=['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
function applyVoucher(sub,v){if(!v||!v.active)return 0;let d=0;if(v.pct>0)d=(sub*v.pct)/100;if(v.flat>0)d+=v.flat;if(sub<parsePrice(v.min))d=0;if(v.max>0)d=Math.min(d,parsePrice(v.max));return Math.max(0,d);}
const defaultStore=()=>({id:genId(),name:'',items:[]});
const defaultSession=i=>({id:genId(),label:'Sesi '+(i+1),status:'draft',stores:[defaultStore(),defaultStore(),defaultStore()],createdAt:Date.now(),scheduleType:'none',scheduleDate:'',scheduleDay:1,scheduleMonthDay:1,voucher:{active:false,pct:0,flat:0,min:0,max:0,label:''}});
function fmtSchedule(s){if(s.scheduleType==='none')return null;if(s.scheduleType==='date'){if(!s.scheduleDate)return'📅 Tanggal belum diisi';return'📅 '+new Date(s.scheduleDate+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}if(s.scheduleType==='daily')return'🔁 Setiap Hari';if(s.scheduleType==='weekly')return'🔁 Setiap '+DAY_NAMES[(s.scheduleDay||1)-1];if(s.scheduleType==='monthly')return'🔁 Setiap Tgl '+(s.scheduleMonthDay||1);return null;}
function schedKey(s){if(s.scheduleType==='date'&&s.scheduleDate)return s.scheduleDate;if(s.scheduleType==='daily')return'ra-daily';if(s.scheduleType==='weekly')return'rb-w-'+String(s.scheduleDay).padStart(2,'0');if(s.scheduleType==='monthly')return'rc-m-'+String(s.scheduleMonthDay).padStart(2,'0');return'zz-none';}
async function fetchPrice(url){try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(7000)});const d=await r.json();const h=d.contents||'';const og=h.match(/<meta[^>]*property=["']og:price:amount["'][^>]*content=["']([0-9.,]+)["']/i);if(og)return parseFloat(og[1].replace(/,/g,''));const jp=h.match(/"price"\s*:\s*"?([0-9]+(?:\.[0-9]+)?)"?/);if(jp)return parseFloat(jp[1]);return null;}catch{return null;}}

function buildWA(sess,idx){
  const lines=[];
  lines.push('🛒 *MISI CHECKOUT — Sesi '+(idx+1)+'*');
  if(sess.label&&sess.label!=='Sesi '+(idx+1))lines.push('📌 '+sess.label);
  const sc=fmtSchedule(sess);if(sc)lines.push('🗓 Jadwal: '+sc);
  lines.push('─────────────────────');
  sess.stores.forEach((st,si)=>{
    if(!st.items.length)return;
    lines.push('\n🏪 *Toko '+(si+1)+': '+(st.name||'(nama toko)')+'*');
    st.items.forEach((it,ii)=>{
      lines.push((ii+1)+'. '+it.name);
      lines.push('   • Jumlah: '+it.qty+' pcs');
      lines.push('   • Link: '+it.link);
    });
  });
  const totB=sess.stores.reduce((s,st)=>s+st.items.reduce((ss,it)=>ss+parsePrice(it.price)*it.qty,0),0);
  const sv=sess.voucher||{};const totD=applyVoucher(totB,sv);
  lines.push('\n─────────────────────');
  if(sv.active){
    const parts=[];
    if(sv.pct>0)parts.push(sv.pct+'%');
    if(sv.flat>0)parts.push('flat '+fmtRp(sv.flat));
    if(sv.min>0)parts.push('min. '+fmtRp(sv.min));
    if(sv.max>0)parts.push('maks. '+fmtRp(sv.max));
    lines.push('🎟 *Gunakan Voucher: '+(sv.label||'Voucher')+'* _('+parts.join(', ')+'_');
  }
  lines.push('💰 Total sebelum voucher: *'+fmtRp(totB)+'*');
  if(totD>0){
    lines.push('✂️ Hemat: *'+fmtRp(totD)+'*');
    lines.push('💳 *Yang harus dibayar: '+fmtRp(totB-totD)+'*');
  }else{
    lines.push('💳 *Yang harus dibayar: '+fmtRp(totB)+'*');
  }
  lines.push('\nMohon segera di-checkout ya! Terima kasih 🙏');
  return lines.join('\n');
}

// State
// Migrate old db: add priceHistory to links that don't have it
function migrateDb(db){
  return db.map(item=>({...item,links:(item.links||[]).map(lnk=>{
    if(!lnk.priceHistory){
      const ph=parsePrice(lnk.price)>0?[{date:todayStr(),price:parsePrice(lnk.price)}]:[];
        return{...lnk,priceHistory:ph,discountedPrice:lnk.discountedPrice||''};
    }
    return{...lnk,discountedPrice:lnk.discountedPrice||''};
  })}));
}
const S={
  db:migrateDb(JSON.parse(localStorage.getItem('ppDb')||'[]')),
  supp:JSON.parse(localStorage.getItem('ppSupp')||'[]'),
  sess:JSON.parse(localStorage.getItem('ppSess')||'null')||[defaultSession(0)],
  tab:'plan',dbtab:'ecom',filter:'all'
};
// Migrate old sessions that have vouchers on stores
S.sess.forEach(sess=>{if(!sess.voucher)sess.voucher={active:false,pct:0,flat:0,min:0,max:0,label:''}; sess.stores.forEach(st=>{if(st.voucher){if(!sess.voucher.active&&st.voucher.active)sess.voucher=st.voucher;delete st.voucher;}});});

function save(){localStorage.setItem('ppDb',JSON.stringify(S.db));localStorage.setItem('ppSupp',JSON.stringify(S.supp));localStorage.setItem('ppSess',JSON.stringify(S.sess));}
function addToDb(item){
  if(!item.name?.trim()||!item.link?.trim())return;
  const pl=item.link.includes('tokopedia')?'tokopedia':'shopee';
  const price=parsePrice(item.price);
  const ex=S.db.find(d=>d.name.toLowerCase()===item.name.toLowerCase());
  if(ex){
    ex.links=ex.links||[];
    const existingLink=ex.links.find(l=>l.url===item.link);
    if(existingLink){
      // Link sudah ada - catat harga baru jika berbeda dari terakhir
      existingLink.priceHistory=existingLink.priceHistory||[];
      if(price>0){
        const lastPrice=existingLink.priceHistory.length?existingLink.priceHistory[existingLink.priceHistory.length-1].price:null;
        if(lastPrice!==price){
          existingLink.priceHistory.push({date:todayStr(),price});
        }
      }
      existingLink.price=price; // update harga terkini
    }else{
      // Link baru
      const ph=price>0?[{date:todayStr(),price}]:[];
      ex.links.push({url:item.link,price,platform:pl,priceHistory:ph});
    }
  }else{
    const ph=price>0?[{date:todayStr(),price}]:[];
    S.db.push({id:genId(),name:item.name,links:[{url:item.link,price,platform:pl,priceHistory:ph}]});
  }
}

// DOM helpers
function el(tag,cls,...kids){const e=document.createElement(tag);if(cls)e.className=cls;for(const k of kids){if(k==null||k===false)continue;if(typeof k==='string'||typeof k==='number')e.appendChild(document.createTextNode(String(k)));else if(k instanceof Node)e.appendChild(k);else if(Array.isArray(k))k.forEach(x=>{if(x instanceof Node)e.appendChild(x);else if(x!=null)e.appendChild(document.createTextNode(String(x)));});}return e;}
function s(tag,style,...kids){const e=el(tag,null,...kids);if(style&&typeof style==='object'&&!Array.isArray(style))Object.assign(e.style,style);return e;}
function inp(type,val,ph,cb,extra={}){const i=document.createElement('input');i.type=type;i.className='inp';i.placeholder=ph||'';i.value=val??'';Object.entries(extra).forEach(([k,v])=>i.setAttribute(k,v));i.addEventListener('input',e=>cb(e.target.value));return i;}
function btn(lbl,cb,color,ghost=false,sm=false){const b=el('button','btn'+(sm?' btn-sm':''));b.style.background=ghost?'transparent':color;b.style.color=ghost?color:'#fff';if(ghost)b.style.border='1.5px solid '+color+'50';if(typeof lbl==='string')b.textContent=lbl;else b.appendChild(lbl);b.addEventListener('click',cb);return b;}
function badge(txt,color){const b=el('span','badge');b.style.background=color+'18';b.style.color=color;b.style.border='1px solid '+color+'40';b.textContent=txt;return b;}
function slabel(txt){const d=el('div','sl');d.textContent=txt;return d;}

// Sync
async function pushData(){try{const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'push',ecommerceDb:S.db,suppliers:S.supp}),redirect:'follow'});const d=await r.json();return d.ok?{ok:true}:{ok:false,err:d.error};}catch(e){return{ok:false,err:e.message};}}
async function pullData(){try{const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'pull'}),redirect:'follow'});const d=await r.json();if(!d.ok)return{ok:false,err:d.error};if(d.ecommerceDb?.length)S.db=d.ecommerceDb.map(x=>({...x,links:x.links||[]}));if(d.suppliers?.length)S.supp=d.suppliers;save();return{ok:true,counts:{db:d.ecommerceDb?.length||0,supp:d.suppliers?.length||0}};}catch(e){return{ok:false,err:e.message};}}

// Voucher editor - input langsung ke objek, TIDAK ada re-render saat mengetik
function renderVoucher(v, onChange, ro) {
  const box = el('div','vbox');

  // Checkbox aktif/nonaktif
  const hrow = s('div',{display:'flex',gap:'8px',alignItems:'center',marginBottom:'10px'});
  const chk = document.createElement('input');
  chk.type='checkbox'; chk.checked=!!v.active; chk.disabled=ro;
  chk.style.accentColor=C.OR; chk.style.width='15px'; chk.style.height='15px'; chk.style.cursor=ro?'default':'pointer';
  chk.addEventListener('change', e => {
    v.active = e.target.checked;
    onChange(v); // checkbox toggle boleh re-render
  });
  hrow.append(chk, s('span',{fontWeight:700,fontSize:'13px',color:C.OR},'🎟 Voucher Sesi'));
  box.appendChild(hrow);

  // Helper: buat input yang langsung update v tanpa re-render
  function makeInp(key, type, ph, parseVal) {
    const i = document.createElement('input');
    i.className = 'inp'; i.type = type; i.placeholder = ph;
    i.value = v[key] || '';
    i.disabled = ro;
    // inputmode untuk keyboard angka yang baik di HP
    if(type === 'tel') i.setAttribute('inputmode','numeric');
    i.addEventListener('input', e => {
      v[key] = parseVal ? parseVal(e.target.value) : e.target.value;
      // Update data & summary tanpa destroy input ini
      onChange(v);
    });
    return i;
  }

  // Row 1: Label | Diskon % | Nominal
  const r1 = s('div',{display:'grid',gridTemplateColumns:'1fr 80px 100px',gap:'6px',marginBottom:'6px'});
  const w1 = s('label',{fontSize:'11px',color:'#8C7B6E',display:'flex',flexDirection:'column',gap:'2px'},'Label Voucher');
  w1.appendChild(makeInp('label','text','cth: Gratis Ongkir', null));
  const w2 = s('label',{fontSize:'11px',color:'#8C7B6E',display:'flex',flexDirection:'column',gap:'2px'},'Diskon %');
  w2.appendChild(makeInp('pct','tel','0', v2 => { v.active=true; return parseFloat(v2)||0; }));
  const w3 = s('label',{fontSize:'11px',color:'#8C7B6E',display:'flex',flexDirection:'column',gap:'2px'},'Nominal (Rp)');
  w3.appendChild(makeInp('flat','tel','0', v2 => { v.active=true; return parsePrice(v2); }));
  r1.append(w1, w2, w3);

  // Row 2: Min Belanja | Maks Potongan
  const r2 = s('div',{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'});
  const w4 = s('label',{fontSize:'11px',color:'#8C7B6E',display:'flex',flexDirection:'column',gap:'2px'},'Min. Belanja (Rp)');
  w4.appendChild(makeInp('min','tel','0', v2 => parsePrice(v2)));
  const w5 = s('label',{fontSize:'11px',color:'#8C7B6E',display:'flex',flexDirection:'column',gap:'2px'},'Maks. Potongan (Rp)');
  w5.appendChild(makeInp('max','tel','0 = tak terbatas', v2 => parsePrice(v2)));
  r2.append(w4, w5);

  box.append(r1, r2);
  return box;
}
// Store card
function renderStore(store,sessId,si,ro){
  const card=el('div','card');
  const hd=el('div','ch');hd.style.background=ro?'linear-gradient(135deg,#bbb,#999)':'linear-gradient(135deg,#EE4D2D,#FF7337)';hd.style.borderRadius='12px 12px 0 0';
  const ni=document.createElement('input');ni.value=store.name;ni.placeholder='Nama Toko';ni.disabled=ro;ni.style.cssText='background:transparent;border:none;outline:none;color:#fff;font-weight:800;font-size:14px;font-family:inherit;flex:1';
  ni.addEventListener('input',e=>{const sess=S.sess.find(x=>x.id===sessId);if(sess){sess.stores[si].name=e.target.value;save();}});
  hd.append(s('span',{},'🏪'),ni);
  if(!ro){const db=s('button',{background:'rgba(0,0,0,.18)',border:'none',borderRadius:'5px',color:'#fff',cursor:'pointer',fontSize:'12px',padding:'2px 7px'},'✕');db.addEventListener('click',()=>{const sess=S.sess.find(x=>x.id===sessId);if(sess){sess.stores.splice(si,1);save();render();}});hd.appendChild(db);}
  card.appendChild(hd);
  const body=el('div','cb');
  const itemsEl=el('div',null);itemsEl.style.marginBottom='8px';
  const subtotalEl=s('div',{marginTop:'8px',background:'#FFF9F5',borderRadius:'8px',padding:'8px 11px',display:'none'});

  const repaintStore=()=>{
    const sess=S.sess.find(x=>x.id===sessId);const st=sess?.stores[si];if(!st)return;
    itemsEl.replaceChildren();
    if(st.items.length){
      const hrow=el('div','ig');hrow.style.cssText='padding-bottom:4px;border-bottom:2px solid #F0E6DE;margin-bottom:2px';
      ['Barang','Harga / Diskon','Qty',''].forEach(h=>{const d=el('div',null,h);d.style.cssText='font-size:10px;font-weight:800;color:#8C7B6E;text-transform:uppercase';hrow.appendChild(d);});
      itemsEl.appendChild(hrow);
      st.items.forEach((it,ii)=>{
        const row=el('div','ig');
        const nd=el('div',null);
        const pl=it.link?.includes('tokopedia')?{l:'Tokopedia',c:'#42B549'}:it.link?.includes('shopee')?{l:'Shopee',c:C.OR}:null;
        nd.appendChild(s('span',{fontWeight:700,fontSize:'12px',color:C.DK},it.name));
        if(pl)nd.appendChild(s('span',{fontSize:'9px',background:pl.c+'18',color:pl.c,borderRadius:'4px',padding:'1px 5px',fontWeight:700,marginLeft:'4px'},pl.l));
        const la=document.createElement('a');la.href=it.link;la.target='_blank';la.style.cssText='font-size:10px;color:#EE4D2D;display:block;word-break:break-all';la.textContent='🔗 '+(it.link.length>28?it.link.slice(0,28)+'…':it.link);nd.appendChild(la);
        const pc=el('div','ig-price');
        // Harga asli - klik untuk edit
        const showPD=()=>{
          const sess2=S.sess.find(x=>x.id===sessId);
          const sv2=sess2?.voucher||{};
          // Hitung harga setelah voucher sesi secara proporsional per item
          const sessionTotal=sess2?.stores.reduce((s2,st2)=>s2+st2.items.reduce((ss,it2)=>ss+parsePrice(it2.price)*it2.qty,0),0)||0;
          const totalDisc=applyVoucher(sessionTotal,sv2);
          const itemPrice=parsePrice(it.price);
          const itemDisc=sessionTotal>0&&totalDisc>0?Math.round(totalDisc*(itemPrice/sessionTotal)):0;
          const afterDisc=itemPrice-itemDisc;
          const hasDisc=itemDisc>0;
          const pd=s('div',{border:'1.5px solid #F0E6DE',borderRadius:'7px',padding:'3px 6px',fontSize:'12px',cursor:'pointer',background:'#FAFAFA',display:'flex',justifyContent:'space-between',gap:'2px'});
          pd.append(s('span',{color:hasDisc?C.MU:C.DK,textDecoration:hasDisc?'line-through':'none',fontSize:hasDisc?'11px':'12px'},itemPrice?itemPrice.toLocaleString('id-ID'):'—'),s('span',{fontSize:'9px',color:C.MU},'✏'));
          pd.title='Klik edit harga';
          pd.addEventListener('click',()=>{
            const pi2=document.createElement('input');pi2.type='tel';pi2.className='inp-sm';pi2.value=it.price||'';
            pc.replaceChildren(pi2);pi2.focus();
            const sv3=()=>{it.price=parsePrice(pi2.value);addToDb(it);save();repaintSummary();showPD();};
            pi2.addEventListener('blur',sv3);pi2.addEventListener('keydown',e=>{if(e.key==='Enter')sv3();});
          });
          pc.replaceChildren(pd);
          // Tampilkan harga setelah voucher jika ada diskon
          if(hasDisc){
            const afterEl=s('div',{fontSize:'11px',fontWeight:700,color:C.OR,padding:'1px 4px',borderRadius:'5px',background:'#FFF0EB'},fmtRp(afterDisc));
            pc.appendChild(afterEl);
          }
        };
        showPD();
        const qi=document.createElement('input');qi.type='number';qi.className='inp-sm';qi.style.textAlign='center';qi.value=it.qty||1;qi.min=1;
        qi.addEventListener('input',e=>{it.qty=+e.target.value||1;save();repaintSummary();});
        const di=ro?el('div',null):s('button',{background:'none',border:'none',cursor:'pointer',color:'#ddd',fontSize:'13px'},'🗑');
        if(!ro)di.addEventListener('click',()=>{st.items.splice(ii,1);save();repaintStore();repaintSummary();});
        row.append(nd,pc,qi,di);itemsEl.appendChild(row);
      });
    }
    // per-store subtotal
    const sub=st.items.reduce((s2,it)=>s2+parsePrice(it.price)*it.qty,0);
    if(sub>0){subtotalEl.style.display='block';subtotalEl.replaceChildren(s('div',{display:'flex',justifyContent:'space-between',fontSize:'11px',color:C.MU},s('span',{},(st.items.reduce((s2,i)=>s2+i.qty,0))+' item'),s('span',{},fmtRp(sub))));}
    else subtotalEl.style.display='none';
  };

  const repaintSummary=()=>{
    const sel=document.getElementById('sum-'+sessId);if(!sel)return;
    const sess=S.sess.find(x=>x.id===sessId);if(!sess)return;
    const stats=sess.stores.filter(st=>st.items.length>0).map(st=>{const sub=st.items.reduce((s2,it)=>s2+parsePrice(it.price)*it.qty,0);return{name:st.name,sub};});
    const totB=stats.reduce((s2,t)=>s2+t.sub,0);
    const sv=sess.voucher||{};const totD=applyVoucher(totB,sv);const totA=totB-totD;
    if(totB===0){sel.style.display='none';return;}
    sel.style.display='block';
    const isDone=sess.status==='done';
    const sbd2=sel.querySelector('.sbd');
    sbd2.replaceChildren(slabel('Ringkasan Sesi Checkout Ini'),...stats.map((st,i)=>{
      const row=s('div',{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'12px',padding:'4px 0',borderBottom:i<stats.length-1?'1px dashed #F0E6DE':'none'});
      row.append(s('span',{color:C.DK,fontWeight:600},'🏪 '+(st.name||'Toko '+(i+1))),s('span',{fontWeight:700,color:C.DK},fmtRp(st.sub)));
      return row;
    }));
    const sbf2=sel.querySelector('.sbf');
    sbf2.style.background=isDone?'linear-gradient(135deg,#00A650,#00C855)':'linear-gradient(135deg,#EE4D2D,#FF7337)';
    const vLabel=sv.active&&sv.label?sv.label:'Voucher';
    sbf2.replaceChildren(
      s('div',{fontSize:'12px',opacity:'.92'},'Sebelum voucher: ',s('b',{},fmtRp(totB)),...(totD>0?[' · 🎟 '+vLabel+': ',s('b',{},'−'+fmtRp(totD))]:[]))
    );
    const tot=s('div',{display:'flex',alignItems:'baseline',gap:'6px'});
    tot.append(s('span',{fontSize:'12px',opacity:'.85'},'Total yang dibayar:'),s('span',{fontWeight:900,fontSize:'20px'},fmtRp(totA)));
    sbf2.appendChild(tot);
  };

  if(!ro){
    let ni2={name:'',link:'',price:'',qty:1};let fs=null;
    const form=el('div',null);form.style.marginTop='8px';form.appendChild(slabel('Tambah Barang'));
    const grid=el('div','fg');
    const nw=s('div',{position:'relative'});
    const nf=inp('text',ni2.name,'Nama barang',v=>{
      ni2.name=v;const m=S.db.filter(d=>d.name.toLowerCase().includes(v.toLowerCase()));sb2.replaceChildren();
      if(v&&m.length){m.forEach(d=>{const it2=el('div','si');it2.textContent=d.name;if(d.links?.length)it2.appendChild(s('span',{color:C.MU,fontSize:'11px'},' · '+d.links.length+' link'));it2.addEventListener('click',()=>{const best=d.links?.[0];const latestPrice=best?.priceHistory?.length?best.priceHistory[best.priceHistory.length-1].price:best?.price||0;const usePrice=best?.discountedPrice&&parsePrice(best.discountedPrice)>0?parsePrice(best.discountedPrice):latestPrice;ni2.name=d.name;ni2.link=best?.url||'';ni2.price=String(usePrice);nf.value=d.name;lf.value=best?.url||'';pf.value=usePrice||'';fs=usePrice?'ok':null;updIcon();sb2.replaceChildren();});sb2.appendChild(it2);});nw.appendChild(sb2);}else sb2.remove();
    });
    const sb2=el('div','sug');nw.appendChild(nf);
    const lf=inp('text',ni2.link,'Link Shopee / Tokopedia',v=>{
      ni2.link=v;ni2.price='';pf.value='';fs=null;updIcon();
      if(v&&(v.includes('shopee')||v.includes('tokopedia'))){fs='load';updIcon();fetchPrice(v).then(p=>{if(p&&p>0){ni2.price=String(p);pf.value=String(p);fs='ok';}else fs='fail';updIcon();});}
    });
    const pw2=el('div','pw');
    const pf=inp('tel',ni2.price,'Harga — otomatis/manual',v=>{ni2.price=v;fs='man';updIcon();});
    const pi2=el('span','pi2');
    const updIcon=()=>{if(fs==='load')pi2.textContent='⏳';else if(fs==='ok'){pi2.textContent='✓';pi2.style.color=C.GR;}else if(fs==='fail'){pi2.textContent='⚠';pi2.style.color=C.YE;}else if(fs==='man'){pi2.textContent='✏';pi2.style.color=C.PU;}else pi2.textContent='';};
    pw2.append(pf,pi2);
    const qf=inp('tel','1','Qty',v=>{ni2.qty=+v||1;});
    grid.append(nw,lf,pw2,qf);
    const ab=btn('+ Tambah Barang',()=>{
      if(!ni2.name.trim()||!ni2.link.trim())return;
      const sess=S.sess.find(x=>x.id===sessId);const st2=sess?.stores[si];if(!st2)return;
      const item={id:genId(),name:ni2.name,link:ni2.link,price:parsePrice(ni2.price),qty:ni2.qty||1};
      st2.items.push(item);addToDb(item);save();
      ni2={name:'',link:'',price:'',qty:1};nf.value='';lf.value='';pf.value='';qf.value='1';fs=null;updIcon();
      repaintStore();repaintSummary();
    },C.OR);ab.style.width='100%';ab.style.marginTop='5px';
    form.append(grid,ab);body.appendChild(form);
  }
  body.append(itemsEl,subtotalEl);card.appendChild(body);repaintStore();
  return{card,repaintSummary};
}

// Session
function renderSession(sess,si){
  const isDone=sess.status==='done';
  const wrap=el('div','sw'+(isDone?' done':''));
  const hdr2=el('div','sh');
  const nb=s('div',{background:isDone?C.GR:C.OR,color:'#fff',borderRadius:'8px',fontWeight:900,fontSize:'13px',padding:'4px 12px'},'Sesi '+(si+1));
  const li=document.createElement('input');li.className='inp';li.value=sess.label;li.disabled=isDone;li.style.cssText='font-weight:600;flex:1;min-width:120px;background:'+(isDone?'#f5f5f5':'#fff');
  li.addEventListener('input',e=>{sess.label=e.target.value;save();});
  const sb3=badge(isDone?'✅ Selesai':'📝 Draft',isDone?C.GR:C.YE);
  const sc2=fmtSchedule(sess);const scb=sc2?s('span',{fontSize:'11px',fontWeight:700,color:sess.scheduleType==='date'?C.PU:C.OR,background:(sess.scheduleType==='date'?C.PU:C.OR)+'12',border:'1px solid '+(sess.scheduleType==='date'?C.PU:C.OR)+'30',borderRadius:'20px',padding:'2px 9px'},sc2):null;
  const cnt=s('div',{fontSize:'11px',color:C.MU},(sess.stores.reduce((s2,st)=>s2+st.items.length,0))+' item · '+(sess.stores.filter(s2=>s2.items.length).length)+'/3 toko');
  const acts=el('div','sa');
  const shareB=btn('💬 Share WA',()=>showWAModal(sess,si),C.WA,true,true);
  const doneB=btn(isDone?'↩ Buka':'✅ Selesai',()=>{sess.status=isDone?'draft':'done';save();render();},isDone?C.YE:C.GR,false,true);
  const delB=btn('🗑',()=>{if(S.sess.length>1){S.sess.splice(S.sess.indexOf(sess),1);save();render();}},C.MU,true,true);
  acts.append(shareB,doneB,delB);
  hdr2.append(nb,li,sb3);if(scb)hdr2.appendChild(scb);hdr2.append(cnt,acts);
  wrap.appendChild(hdr2);

  // schedule
  const sw2=el('div',null);sw2.style.marginBottom='12px';sw2.appendChild(slabel('🗓 Jadwal Checkout'));
  const spw=s('div',{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'});
  [['none','—'],['date','📅 Tanggal'],['daily','🔁 Harian'],['weekly','🔁 Mingguan'],['monthly','🔁 Bulanan']].forEach(([val,lbl])=>{
    const p=el('button','sp'+(sess.scheduleType===val?' active':''));p.textContent=lbl;p.disabled=isDone;
    p.addEventListener('click',()=>{if(isDone)return;sess.scheduleType=val;save();render();});spw.appendChild(p);
  });
  if(sess.scheduleType==='date'&&!isDone){const di=inp('date',sess.scheduleDate||'',null,v=>{sess.scheduleDate=v;save();render();});di.style.cssText='border:1.5px solid #EE4D2D60;border-radius:8px;padding:3px 9px;font-size:12px;width:auto;class:inp';spw.appendChild(di);}
  if(sess.scheduleType==='weekly'&&!isDone){const sel=document.createElement('select');sel.style.cssText='border:1.5px solid #EE4D2D60;border-radius:8px;padding:3px 8px;font-size:12px';DAY_NAMES.forEach((d,i)=>{const o=document.createElement('option');o.value=i+1;o.textContent=d;if(sess.scheduleDay===i+1)o.selected=true;sel.appendChild(o);});sel.addEventListener('change',e=>{sess.scheduleDay=+e.target.value;save();render();});spw.appendChild(sel);}
  if(sess.scheduleType==='monthly'&&!isDone){const sel=document.createElement('select');sel.style.cssText='border:1.5px solid #EE4D2D60;border-radius:8px;padding:3px 8px;font-size:12px';for(let i=1;i<=31;i++){const o=document.createElement('option');o.value=i;o.textContent='Tanggal '+i;if(sess.scheduleMonthDay===i)o.selected=true;sel.appendChild(o);}sel.addEventListener('change',e=>{sess.scheduleMonthDay=+e.target.value;save();render();});spw.appendChild(sel);}
  sw2.appendChild(spw);wrap.appendChild(sw2);

  if(isDone){
    const totB2=sess.stores.reduce((s2,st)=>s2+st.items.reduce((ss,it)=>ss+parsePrice(it.price)*it.qty,0),0);
    const totD2=applyVoucher(totB2,sess.voucher||{});
    const di2=s('div',{background:C.GR+'15',border:'1px solid '+C.GR+'40',borderRadius:'10px',padding:'8px 14px',marginBottom:'12px',display:'flex',gap:'16px',flexWrap:'wrap',alignItems:'center'});
    di2.append(s('span',{fontWeight:700,color:C.GR,fontSize:'13px'},'✅ Checkout Selesai'),s('span',{fontSize:'12px',color:C.MU},'Total Bayar: ',s('b',{color:C.DK},fmtRp(totB2-totD2))));
    if(totD2>0)di2.appendChild(s('span',{fontSize:'12px',color:C.GR},'Hemat: '+fmtRp(totD2)));
    wrap.appendChild(di2);
  }

  // stores grid
  const gc=Math.min(Math.max(sess.stores.length,1),3);
  const grid=el('div','sg g'+gc);
  let firstRepaint=null;
  sess.stores.forEach((st,si2)=>{const{card,repaintSummary}=renderStore(st,sess.id,si2,isDone);grid.appendChild(card);if(!firstRepaint)firstRepaint=repaintSummary;});
  if(!isDone&&sess.stores.length<3){const ab=el('button','asb');ab.append(s('span',{fontSize:'26px'},'+'),'Tambah Toko');ab.addEventListener('click',()=>{sess.stores.push(defaultStore());save();render();});grid.appendChild(ab);}
  wrap.appendChild(grid);

  // Voucher (satu per sesi, muncul setelah toko-toko)
  if(!isDone){
    const vc=el('div',null);vc.style.marginTop='12px';
    const vContainer=el('div',null);
    // Render voucher ONCE - inputs update data langsung tanpa destroy DOM
    if(!sess.voucher)sess.voucher={active:false,pct:0,flat:0,min:0,max:0,label:''};
    vContainer.replaceChildren(renderVoucher(
      sess.voucher,
      v => {
        // v adalah objek yang sama (mutated langsung), update summary + repaint item prices
        save();
        // Re-render item rows so harga setelah diskon auto-update
        grid.querySelectorAll('.ig-price').forEach(pc2=>{
          // trigger repaint by dispatching custom event - handled by each store's repaintStore
        });
        if(firstRepaint)firstRepaint();
        // Re-render stores to update per-item discount display
        render();
      },
      false
    ));
    vc.appendChild(vContainer);wrap.appendChild(vc);
  }

  // Summary bar
  const sumEl=el('div','sb');sumEl.id='sum-'+sess.id;
  const _sb=el('div','sbd');_sb.style.background=isDone?'#F6FFFA':'#FFF9F5';
  const _sf=el('div','sbf');
  sumEl.append(_sb,_sf);
  wrap.appendChild(sumEl);
  setTimeout(()=>{if(firstRepaint)firstRepaint();},0);
  return wrap;
}

// Ecommerce DB

  const wrap=el('div','card');wrap.style.overflow='visible';

    const fil=S.db.filter(d=>d.name.toLowerCase().includes(search.toLowerCase()));

              hr2.appendChild(dp2);hl2.appendChild(hr2);

          discInp.style.flex='1';
          if(lnk.discountedPrice&&parsePrice(lnk.discountedPrice)>0){
            const latestP=lnk.priceHistory?.length?lnk.priceHistory[lnk.priceHistory.length-1].price:parsePrice(lnk.price);
            const savedAmt=latestP-parsePrice(lnk.discountedPrice);
            if(savedAmt>0)discRow.appendChild(s('span',{fontSize:'11px',color:'#00A650',fontWeight:700,whiteSpace:'nowrap'},'Hemat '+fmtRp(savedAmt)));
          }
          discRow.appendChild(discInp);
          lbox.appendChild(discRow);
          eb2.appendChild(lbox);
        });
        const alb=s('button',{background:'transparent',border:'1.5px dashed #5433AB50',borderRadius:'7px',padding:'5px 12px',color:C.PU,fontWeight:600,fontSize:'12px',cursor:'pointer'},'+ Tambah Link & Harga');
        alb.addEventListener('click',()=>{if(!item.links)item.links=[];item.links.push({url:'',price:'',platform:'shopee'});save();repaint();});
        eb2.appendChild(alb);ic.appendChild(eb2);
      }else if((item.links||[]).length>0){
        const lb=s('div',{padding:'6px 12px 8px'});
        item.links.forEach((lnk,idx2)=>{
          const pc2=lnk.platform==='tokopedia'?'#42B549':C.OR;
          const latest=lnk.priceHistory?.length?lnk.priceHistory[lnk.priceHistory.length-1]:null;
          const latestPrice=latest?.price||lnk.price||0;
          // Link row
          const row=s('div',{display:'flex',justifyContent:'space-between',fontSize:'12px',padding:'4px 0',alignItems:'center',borderBottom:'1px dashed #F0E6DE'});
          const pb=s('span',{fontSize:'10px',background:pc2+'18',color:pc2,borderRadius:'4px',padding:'1px 5px',fontWeight:700,marginRight:'6px'},lnk.platform==='tokopedia'?'Tokopedia':'Shopee');
          const la=document.createElement('a');la.href=lnk.url;la.target='_blank';la.style.color=C.OR;la.textContent='🔗 Link '+(idx2+1);
          const priceInfo=s('div',{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'2px'});
          priceInfo.appendChild(s('span',{color:C.GR,fontWeight:700,fontSize:'12px'},fmtRp(latestPrice)));
          if(lnk.discountedPrice&&parsePrice(lnk.discountedPrice)>0){
            priceInfo.appendChild(s('span',{color:'#EE4D2D',fontWeight:800,fontSize:'13px'},'🏷 '+fmtRp(parsePrice(lnk.discountedPrice))));
            const saved=latestPrice-parsePrice(lnk.discountedPrice);
            if(saved>0)priceInfo.appendChild(s('span',{color:'#00A650',fontSize:'10px'},'Hemat '+fmtRp(saved)));
          }
          row.append(s('div',{},pb,la),priceInfo);
          lb.appendChild(row);
          // Price history
          if((lnk.priceHistory||[]).length>1){
            const hist=s('div',{paddingLeft:'8px',paddingBottom:'4px'});
            [...lnk.priceHistory].reverse().forEach((ph,phi)=>{
              const isLatest=phi===0;
              const hr=s('div',{display:'flex',gap:'10px',alignItems:'center',padding:'2px 6px',borderRadius:'5px',background:isLatest?C.GR+'10':'transparent',fontSize:'11px'});
              hr.append(s('span',{color:'#8C7B6E',minWidth:'75px'},fmtDate(ph.date)),s('span',{fontWeight:isLatest?700:400,color:isLatest?C.GR:C.DK},fmtRp(ph.price)));
              if(isLatest)hr.appendChild(badge('Terkini',C.GR));
              hist.appendChild(hr);
            });
            lb.appendChild(hist);
          }else if((lnk.priceHistory||[]).length===1){
            lb.appendChild(s('div',{fontSize:'11px',color:'#8C7B6E',paddingLeft:'8px',paddingBottom:'2px'},'Dicatat: '+fmtDate(lnk.priceHistory[0].date)));
          }
        });ic.appendChild(lb);
      }
      listEl.appendChild(ic);
    });
  };
  const tr=s('div',{display:'flex',gap:'6px',marginBottom:'12px'});
  const sf=inp('text',search,'🔍 Cari barang...',v=>{search=v;repaint();});sf.style.flex='1';
  const nf=inp('text',newName,'Nama barang baru',v=>{newName=v;});nf.style.flex='2';
  const ab=btn('+ Tambah',()=>{if(!newName.trim())return;S.db.push({id:genId(),name:newName.trim(),links:[]});save();newName='';nf.value='';repaint();},C.PU);
  tr.append(sf,nf,ab);body.append(tr,listEl);wrap.appendChild(body);repaint();return wrap;
}

// Supplier DB
function renderSuppDb(){
  const wrap=el('div','card');wrap.style.overflow='visible';
  const hd=el('div','ch');hd.style.background='linear-gradient(135deg,#0F7B6C,#1AA08A)';
  hd.append(s('span',{fontSize:'18px'},'🏭'),s('span',{color:'#fff',fontWeight:800,fontSize:'15px',flex:1},'Database Supplier'),badge(S.supp.length+' supplier','#A0F0E4'));
  wrap.appendChild(hd);const body=el('div','cb');
  let search='',expKey=null,editId=null,newSp={name:'',phone:''};const newIN={},newPR={};
  const listEl=s('div',{display:'flex',flexDirection:'column',gap:'10px',maxHeight:'600px',overflowY:'auto'});
  const repaint=()=>{
    const fil=S.supp.filter(s2=>s2.name.toLowerCase().includes(search.toLowerCase())||s2.items?.some(it=>it.name.toLowerCase().includes(search.toLowerCase())));
    listEl.replaceChildren();
    if(!fil.length){listEl.appendChild(s('div',{textAlign:'center',color:C.MU,padding:'32px',fontSize:'13px'},'Belum ada supplier.'));return;}
    fil.forEach(supp=>{
      const sc=el('div','sc-card');
      const sh=el('div','sc-hd');
      const na=s('div',{flex:1});
      if(editId===supp.id){const ni=inp('text',supp.name,'Nama',v=>{supp.name=v;save();});ni.style.cssText='font-weight:700;margin-bottom:4px';const pi2=inp('text',supp.phone||'','No. WA',v=>{supp.phone=v;save();});na.append(ni,pi2);}
      else{na.appendChild(s('span',{fontWeight:800,fontSize:'14px',color:C.DK},supp.name));if(supp.phone){const wa=document.createElement('a');wa.href='https://wa.me/'+supp.phone.replace(/\D/g,'');wa.target='_blank';wa.style.cssText='margin-left:10px;font-size:12px;color:#25D366;font-weight:600';wa.textContent='📱 '+supp.phone;na.appendChild(wa);}}
      const eb=s('button',{background:'none',border:'none',cursor:'pointer',fontSize:'14px'},'✏️');eb.addEventListener('click',()=>{editId=editId===supp.id?null:supp.id;repaint();});
      const db2=s('button',{background:'none',border:'none',cursor:'pointer',fontSize:'14px'},'🗑');db2.addEventListener('click',()=>{S.supp=S.supp.filter(x=>x.id!==supp.id);save();repaint();});
      sh.append(na,badge((supp.items||[]).length+' barang',C.TE),eb,db2);sc.appendChild(sh);
      const ib=s('div',{padding:'10px 14px'});
      (supp.items||[]).forEach(item=>{
        const key=supp.id+'-'+item.id;const isExp=expKey===key;
        const lat=item.priceHistory?.length?item.priceHistory[item.priceHistory.length-1]:null;
        const ic=s('div',{border:'1px solid #F0E6DE',borderRadius:'9px',marginBottom:'6px',overflow:'hidden'});
        const ih=s('div',{display:'flex',alignItems:'center',gap:'8px',padding:'7px 10px',background:'#FAFAFA',cursor:'pointer'});
        ih.append(s('span',{flex:1,fontWeight:600,fontSize:'13px'},item.name));
        if(lat)ih.appendChild(s('span',{fontSize:'13px',color:C.GR,fontWeight:700},fmtRp(lat.price)));
        if(item.priceHistory?.length)ih.appendChild(s('span',{fontSize:'10px',color:C.MU},'('+item.priceHistory.length+' riwayat)'));
        ih.append(s('span',{color:C.MU,fontSize:'12px'},isExp?'▲':'▼'));
        const di=s('button',{background:'none',border:'none',cursor:'pointer',color:'#ccc',fontSize:'13px'},'🗑');
        di.addEventListener('click',e=>{e.stopPropagation();supp.items=supp.items.filter(i=>i.id!==item.id);save();repaint();});
        ih.append(di);ih.addEventListener('click',()=>{expKey=isExp?null:key;repaint();});ic.appendChild(ih);
        if(isExp){
          const ex=s('div',{padding:'10px 12px',borderTop:'1px solid #F0E6DE'});
          if((item.priceHistory||[]).length){
            ex.appendChild(slabel('Riwayat Harga (terbaru di atas)'));
            const hl=s('div',{display:'flex',flexDirection:'column',gap:'3px',marginBottom:'10px'});
            [...item.priceHistory].reverse().forEach((ph,phi)=>{
              const isL=phi===0;
              const row=el('div','ph');row.style.cssText='background:'+(isL?C.GR+'10':'#f9f9f9')+';border:1px solid '+(isL?C.GR+'30':'#F0E6DE');
              row.append(s('span',{fontSize:'11px',color:C.MU,minWidth:'80px'},fmtDate(ph.date)),s('span',{fontWeight:700,color:isL?C.GR:C.DK,fontSize:'13px',flex:1},fmtRp(ph.price)));
              if(isL)row.appendChild(badge('Terkini',C.GR));
              const dp=s('button',{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'#ccc',fontSize:'12px'},'✕');
              dp.addEventListener('click',()=>{item.priceHistory.splice(item.priceHistory.length-1-phi,1);save();repaint();});
              row.appendChild(dp);hl.appendChild(row);
            });ex.appendChild(hl);
          }
          ex.appendChild(slabel('Update Harga Terbaru'));
          const pr=s('div',{display:'flex',gap:'6px',alignItems:'center'});
          const pf=inp('tel',newPR[key]||'','Harga baru (Rp)',v=>{newPR[key]=v;});pf.style.flex='1';
          const tl=s('span',{fontSize:'11px',color:C.MU,whiteSpace:'nowrap'},'📅 '+fmtDate(todayStr()));
          const ab=btn('+ Input',()=>{const val=parsePrice(newPR[key]||'');if(!val)return;if(!item.priceHistory)item.priceHistory=[];item.priceHistory.push({date:todayStr(),price:val});newPR[key]='';save();repaint();},C.TE,false,true);
          pr.append(pf,tl,ab);ex.appendChild(pr);ic.appendChild(ex);
        }
        ib.appendChild(ic);
      });
      const air=s('div',{display:'flex',gap:'6px',marginTop:'6px'});
      const nif=inp('text',newIN[supp.id]||'','Tambah barang untuk supplier ini',v=>{newIN[supp.id]=v;});
      const nib=btn('+ Barang',()=>{const name=(newIN[supp.id]||'').trim();if(!name)return;if(!supp.items)supp.items=[];supp.items.push({id:genId(),name,priceHistory:[]});newIN[supp.id]='';save();repaint();},C.TE,true,true);
      air.append(nif,nib);ib.appendChild(air);sc.appendChild(ib);listEl.appendChild(sc);
    });
  };
  const af=s('div',{background:'#F0FDFB',border:'1.5px solid #0F7B6C20',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px'});
  af.appendChild(slabel('Tambah Supplier Baru'));
  const ag=s('div',{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:'8px'});
  const snf=inp('text',newSp.name,'Nama perusahaan / supplier',v=>{newSp.name=v;});
  const spf=inp('text',newSp.phone,'No. WA / HP',v=>{newSp.phone=v;});
  const sab=btn('+ Tambah',()=>{if(!newSp.name.trim())return;S.supp.push({id:genId(),name:newSp.name.trim(),phone:newSp.phone.trim(),items:[]});save();newSp={name:'',phone:''};snf.value='';spf.value='';repaint();},C.TE);
  ag.append(snf,spf,sab);af.appendChild(ag);
  const sf2=inp('text',search,'🔍 Cari supplier atau barang...',v=>{search=v;repaint();});sf2.style.marginBottom='12px';
  body.append(af,sf2,listEl);wrap.appendChild(body);repaint();return wrap;
}

// Sheets panel
function renderSheetsPanel(){
  const wrap=el('div','card');
  const hd=el('div','ch');hd.style.background='linear-gradient(135deg,#34A853,#2E8B47)';
  hd.append(s('span',{fontSize:'18px'},'📊'),s('span',{color:'#fff',fontWeight:800,fontSize:'15px',flex:1},'Sinkronisasi Google Sheets'));
  if(SCRIPT_URL)hd.appendChild(badge('✓ Terhubung','#A8F0B8'));
  wrap.appendChild(hd);const body=el('div','cb');
  const stEl=el('div','stmsg');

  // URL input
  const urlWrap=s('div',{marginBottom:'14px'});
  urlWrap.appendChild(slabel('URL Google Apps Script (Web App)'));
  const urlRow=s('div',{display:'flex',gap:'8px'});
  const urlField=document.createElement('input');urlField.className='inp';urlField.style.flex='1';urlField.placeholder='https://script.google.com/macros/s/AKfy.../exec';urlField.value=SCRIPT_URL||'';
  const saveUrlBtn=btn('Simpan',()=>{SCRIPT_URL=urlField.value.trim();localStorage.setItem('ppScriptUrl',SCRIPT_URL);stEl.style.display='block';stEl.style.background=C.GR+'12';stEl.style.color=C.GR;stEl.style.border='1.5px solid '+C.GR+'30';stEl.textContent='✅ URL disimpan!';},C.SH);
  urlRow.append(urlField,saveUrlBtn);urlWrap.append(urlRow);

  const sg=el('div','sync-btns');
  const pb=el('button','sync-btn');pb.style.background=C.SH;pb.append(s('span',{fontSize:'22px'},'⬆'),s('span',{},'Push ke Sheets'),s('span',{fontSize:'11px',fontWeight:400,opacity:'.85'},'App → Google Sheets'));
  pb.addEventListener('click',async()=>{
    pb.style.background='#ccc';pu.style.background='#ccc';pb.children[1].textContent='Mengirim...';stEl.style.display='none';
    const r=await pushData();
    pb.style.background=C.SH;pu.style.background=C.PU;pb.children[1].textContent='Push ke Sheets';
    stEl.style.display='block';stEl.style.background=r.ok?C.GR+'12':'#FFEEEE';stEl.style.color=r.ok?C.GR:'#CC0000';stEl.style.border='1.5px solid '+(r.ok?C.GR:'#CC0000')+'30';
    stEl.textContent=r.ok?'✅ Data berhasil dikirim ke Google Sheets!':'❌ Gagal: '+(r.err||'Error');
  });
  const pu=el('button','sync-btn');pu.style.background=C.PU;pu.append(s('span',{fontSize:'22px'},'⬇'),s('span',{},'Pull dari Sheets'),s('span',{fontSize:'11px',fontWeight:400,opacity:'.85'},'Google Sheets → App'));
  pu.addEventListener('click',async()=>{
    pb.style.background='#ccc';pu.style.background='#ccc';pu.children[1].textContent='Mengambil...';stEl.style.display='none';
    const r=await pullData();
    pb.style.background=C.SH;pu.style.background=C.PU;pu.children[1].textContent='Pull dari Sheets';
    stEl.style.display='block';stEl.style.background=r.ok?C.GR+'12':'#FFEEEE';stEl.style.color=r.ok?C.GR:'#CC0000';stEl.style.border='1.5px solid '+(r.ok?C.GR:'#CC0000')+'30';
    stEl.textContent=r.ok?'✅ Import berhasil! ('+r.counts.db+' barang, '+r.counts.supp+' supplier)':'❌ Gagal: '+(r.err||'Error');
    if(r.ok)setTimeout(()=>render(),600);
  });
  sg.append(pb,pu);body.append(urlWrap,sg,stEl);wrap.appendChild(body);return wrap;
}

// Main render
function render(){
  const app=document.getElementById('app');
  const root=document.createElement('div');
  const hdr2=el('div','header');const hi2=el('div','hi');
  const ht2=el('div','ht');
  ht2.append(s('div',{fontSize:'32px'},'🛍️'),s('div',{},s('div',{fontWeight:900,fontSize:'22px',letterSpacing:'-.5px'},'Purchasing Planner'),s('div',{fontSize:'12px',opacity:'.85'},'E-Commerce · Supplier · Sinkron Google Sheets')));
  if(SCRIPT_URL)ht2.appendChild(s('div',{marginLeft:'auto',background:'rgba(255,255,255,.2)',borderRadius:'8px',padding:'4px 12px',fontSize:'11px',fontWeight:700},'📊 Sheets Connected'));
  const tabs=el('div','htabs');
  [['plan','📋 Rencana Belanja'],['db','🗄️ Database & Supplier']].forEach(([key,lbl])=>{
    const t=el('button','tab-btn'+(S.tab===key?' active':''));t.textContent=lbl;t.addEventListener('click',()=>{S.tab=key;render();});tabs.appendChild(t);
  });
  hi2.append(ht2,tabs);hdr2.appendChild(hi2);root.appendChild(hdr2);
  const cont=el('div','container');

  if(S.tab==='plan'){
    const fb2=el('div','fb');
    const dc=S.sess.filter(s2=>s2.status==='done').length;const drc=S.sess.filter(s2=>s2.status==='draft').length;
    [['all','Semua ('+S.sess.length+')'],['draft','📝 Draft ('+drc+')'],['done','✅ Selesai ('+dc+')']].forEach(([val,lbl])=>{
      const b2=el('button','fb-btn');b2.textContent=lbl;if(S.filter===val){b2.style.background=C.OR;b2.style.color='#fff';b2.style.borderColor=C.OR;}
      b2.addEventListener('click',()=>{S.filter=val;render();});fb2.appendChild(b2);
    });
    cont.appendChild(fb2);
    const vis=S.sess.filter(s2=>S.filter==='all'||s2.status===S.filter).slice().sort((a,b)=>schedKey(a).localeCompare(schedKey(b)));
    vis.forEach((sess,si)=>{
      let gl=null;const prev=vis[si-1];
      if(sess.scheduleType==='none'&&(si===0||prev?.scheduleType!=='none'))gl='⏳ Tanpa Jadwal';
      else if(sess.scheduleType==='date'){const td=sess.scheduleDate||'';if(si===0||prev?.scheduleType!=='date'||td!==(prev?.scheduleDate||'')){if(!td&&(si===0||prev?.scheduleType!=='date'))gl='📅 Tanggal Belum Ditentukan';else if(td)gl='📅 '+new Date(td+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}}
      else if(sess.scheduleType==='daily'&&prev?.scheduleType!=='daily')gl='🔁 Setiap Hari';
      else if(sess.scheduleType==='weekly'&&(prev?.scheduleType!=='weekly'||prev?.scheduleDay!==sess.scheduleDay))gl='🔁 Setiap '+DAY_NAMES[(sess.scheduleDay||1)-1];
      else if(sess.scheduleType==='monthly'&&(prev?.scheduleType!=='monthly'||prev?.scheduleMonthDay!==sess.scheduleMonthDay))gl='🔁 Setiap Tanggal '+(sess.scheduleMonthDay||1);
      if(gl){const dv=el('div','gdiv');dv.style.marginTop=si>0?'8px':'0';const lb2=el('div','gl');lb2.style.background=sess.scheduleType==='none'?'#eee':sess.scheduleType==='date'?C.PU+'18':C.OR+'15';lb2.style.color=sess.scheduleType==='none'?C.MU:sess.scheduleType==='date'?C.PU:C.OR;lb2.textContent=gl;dv.append(lb2,el('div','dl'));cont.appendChild(dv);}
      cont.appendChild(renderSession(sess,S.sess.indexOf(sess)));
    });
    if(!vis.length)cont.appendChild(s('div',{textAlign:'center',color:C.MU,padding:'40px',fontSize:'14px'},'Tidak ada sesi dengan status ini.'));
    const asb2=el('button','addss');asb2.textContent='+ Tambah Sesi Checkout Baru';asb2.addEventListener('click',()=>{S.sess.push(defaultSession(S.sess.length));save();render();});cont.appendChild(asb2);
  }

  if(S.tab==='db'){
    const dbt2=el('div','dbt');
    [['ecom','🛍️ E-Commerce',C.PU],['supp','🏭 Supplier',C.TE],['sheets','📊 Google Sheets',C.SH]].forEach(([key,lbl,color])=>{
      const t=el('button','dbt-btn');t.textContent=lbl;if(S.dbtab===key){t.style.background=color;t.style.color='#fff';t.style.borderColor=color;}
      t.addEventListener('click',()=>{S.dbtab=key;render();});dbt2.appendChild(t);
    });
    cont.appendChild(dbt2);
    if(S.dbtab==='ecom')cont.appendChild(renderEcomDb());
    if(S.dbtab==='supp')cont.appendChild(renderSuppDb());
    if(S.dbtab==='sheets')cont.appendChild(renderSheetsPanel());
  }
  root.appendChild(cont);app.replaceChildren(root);
}
render();
</script>
